# ── DATABASE ─────────────────────────────────────────────────────────────────
# Reads from environment variables (set in Railway/Render dashboard for production)
# For local dev, set these in your OS environment or in a local .env file
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DATABASE_USERNAME:postgres.jpzhpvdkqqyincssxtvm}
spring.datasource.password=${DATABASE_PASSWORD:your_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / HIBERNATE ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── SERVER ────────────────────────────────────────────────────────────────────
# Railway sets PORT env var automatically
server.port=${PORT:8081}

# ── JACKSON ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null